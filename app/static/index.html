<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CommaCam</title>
  <link rel="icon" href="/favicon-light.png" media="(prefers-color-scheme: light)">
  <link rel="icon" href="/favicon-dark.png" media="(prefers-color-scheme: dark)">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Azeret+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
</head>
<body>
  <div id="banner" class="banner hidden"></div>

  <header class="app-header">
    <div class="header-brand">
      <span class="brand-name">CommaCam</span>
      <span class="brand-rec">● REC</span>
    </div>
    <nav>
      <button class="tab-btn active" data-tab="recordings">Recordings</button>
      <button class="tab-btn" data-tab="sync">Sync</button>
      <button class="tab-btn" data-tab="logs">Logs</button>
      <button class="tab-btn" data-tab="settings">Settings</button>
    </nav>
  </header>

  <div id="tab-recordings" class="tab-panel">
    <div class="recordings-controls">
      <input type="date" id="date-filter" class="date-filter-input">
      <button id="date-filter-clear" class="date-filter-clear hidden">✕ Clear</button>
    </div>
    <div id="recordings-grid-root"><p class="muted">Loading...</p></div>
  </div>

  <div id="tab-sync" class="tab-panel hidden">
    <div class="sync-header">
      <span id="last-sync-label" class="muted">Last sync: —</span>
      <span id="sync-badge"></span>
    </div>
    <button id="pull-now-btn">Pull Now</button>
    <pre id="sync-log"></pre>
  </div>

  <div id="tab-logs" class="tab-panel hidden">
    <div class="log-controls">
      <button id="log-clear-btn">Clear</button>
      <label class="log-toggle">
        <input type="checkbox" id="log-autoscroll" checked> Auto-scroll
      </label>
    </div>
    <div id="log-list"></div>
  </div>

  <div id="tab-settings" class="tab-panel hidden">
    <form id="settings-form">
      <label>Device IP
        <input name="device_ip" type="text" placeholder="192.168.1.x">
      </label>
      <label>Device User
        <input name="device_user" type="text" placeholder="comma">
      </label>
      <label>SSH Port
        <input name="ssh_port" type="number" value="22" min="1" max="65535">
      </label>
      <label>Remote Path
        <input name="remote_path" type="text" placeholder="/data/media/0/realdata/">
      </label>
      <label>Local Path (container)
        <input name="local_path" type="text" placeholder="/recordings">
        <span class="hint">Use the container-internal path (e.g. /recordings)</span>
      </label>
      <label>SSH Private Key
        <textarea name="ssh_key" placeholder="Paste private key content here. Leave blank to keep existing key."></textarea>
      </label>
      <div id="settings-error" class="error hidden"></div>
      <button type="submit">Save Settings</button>
    </form>
  </div>

  <!-- Modal -->
  <div id="rec-modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-box">
      <button id="modal-close" class="modal-close" aria-label="Close">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
